import java.time.Duration

/*
 * This file was generated by the Gradle 'init' task.
 *
 * This is a general purpose Gradle build.
 * Learn how to create Gradle builds at https://guides.gradle.org/creating-new-gradle-builds
 */

buildscript {
    repositories {
        mavenLocal()
        mavenCentral()

    }
}
ext.releaseVersion = version
ext.isReleaseVersion = { -> !version.toString().endsWith('SNAPSHOT') }


enum Licence {
    APACHE('The Apache License, Version 2.0', 'http://www.apache.org/licenses/LICENSE-2.0.txt')

    Licence(String name, String url) {
        this.name = name
        this.url = url
    }

    String name
    String url
}

enum TaackUiPublished {
    CAD_DSL('CAD Groovy DSL', 'CAD Groovy DSL Definition'),
    CAD_DSL_NATIVE('OCCT Java Binding', 'OCCT Java Binding With Jextract', false)

    TaackUiPublished(String name, String desc, Boolean hasJava = true, Licence licence = Licence.APACHE) {
        this.name = name
        this.desc = desc
        this.hasJava = hasJava
        this.licence = licence
    }

    final Boolean hasJava
    final String name
    final String desc
    final Licence licence

    String getProject() {
        toString().replace('_', '-').toLowerCase()
    }

    static TaackUiPublished fromName(String name) {
        values().find { it.project == name }
    }
}

subprojects {
    TaackUiPublished taackUiPublished = TaackUiPublished.fromName(name)
    println taackUiPublished
    if (taackUiPublished) {
        version releaseVersion
        group "org.taack"

        if (taackUiPublished.hasJava) {
            apply plugin: 'java'
            apply plugin: 'java-library'
        }
        apply plugin: 'maven-publish'

        repositories {
            mavenLocal()
            mavenCentral()
        }

        publishing {
            publications {
                maven(MavenPublication) {
                    if (taackUiPublished.hasJava)
                        from components.java
                    else
                        println components
//                        afterEvaluate {
//                            artifact source: sourcesJar, classifier: "sources"
//                            artifact source: javadocJar, classifier: "javadoc"
//                        }
                    if (taackUiPublished.hasJava)
                        versionMapping {
                            usage('java-api') {
                                fromResolutionOf('runtimeClasspath')
                            }
                            usage('java-runtime') {
                                fromResolutionResult()
                            }
                        }
                    pom {
                        name = taackUiPublished.name
                        description = taackUiPublished.desc
                        url = 'http://taack.org'
                        licenses {
                            license {
                                name = taackUiPublished.licence.name
                                url = taackUiPublished.licence.url
                            }
                        }
                        scm {
                            url = 'scm:git@github.com:Taack/cad-builder.git'
                            connection = 'scm:git@github.com:Taack/cad-builder.git'
                            developerConnection = 'scm:git@github.com:Taack/cad-builder.git'
                        }
                        developers {
                            developer {
                                id = 'org.taack'
                                name = 'Adrien Guichard'
                                email = 'adrien.guichard@taack.org'
                            }
                        }
                    }
                }
            }
            if (isReleaseVersion())
                repositories {
                    maven {
                        name = 'myRepo'
                        url = parent.layout.projectDirectory.dir("repo")
                    }
                }
        }
        version releaseVersion
        if (isReleaseVersion()) {
            apply plugin: 'signing'

            group "org.taack"

            println "isReleaseVersion() ${isReleaseVersion()}"
            println "isReleaseVersion ${isReleaseVersion}"
            afterEvaluate {
//                artifacts {
//                    archives javadocJar, sourcesJar
//                }

                signing {
                    required { isReleaseVersion() && gradle.taskGraph.hasTask("publish") }
                    sign publishing.publications.maven
                }
            }

            tasks.withType(Sign).configureEach {
                onlyIf { isReleaseVersion() }
            }
        }
    }
}
