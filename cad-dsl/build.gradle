plugins {
    id 'c'
    id 'groovy'
    id 'application'
    id 'de.infolektuell.jextract' version '1.3.0'
}

group = 'org.taack'
version = '1.0-SNAPSHOT'

def OCCT78 = file("/usr/lib").absolutePath
def nativeLibPath = file("${project.parent.projectDir}/cad-dsl/build/libs/nativeLib/shared").absolutePath
def nativeLibPath2 = file("${project.parent.projectDir}/cad-dsl-native/build/lib/main/release").absolutePath

model {
    components {
        nativeLib(NativeLibrarySpec) {
            sources {
                c {
                    source {
                        srcDir 'src/main/c' // Path to your C source files
                    }
                }
            }
        }
    }
    binaries {
        all {

            // Define a preprocessor macro for every binary
            cppCompiler.define "DEBUG"

            // Define toolchain-specific compiler and linker options
            if (toolChain in Gcc) {
                println "Linking with Gcc"
                cppCompiler.args "-g", "-fno-access-control"
                linker.args "-Xlinker", "-S", "-B", "direct", "-L", nativeLibPath, "-L", nativeLibPath2, "-L", OCCT78, "-l", "cad-dsl-native", "-l", "GL", "-l", "GLU", "-l", "GLX", "-l", "GLEW"
            }
            if (toolChain in VisualCpp) {
                cppCompiler.args "/Zi"
                linker.args "/DEBUG"
            }
        }
    }
}

// Tells gradle to wait for our native library to compile before we can run our java application
run.dependsOn 'nativeLibSharedLibrary'

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of 25
    }
}

application {
    mainClass = 'org.taack.Main'
    applicationDefaultJvmArgs = ["-Djava.library.path=" + OCCT78 + ":" + nativeLibPath + ":" + nativeLibPath2, "--enable-preview", "--enable-native-access=ALL-UNNAMED"]
}

jextract.libraries {
    def occt = register('occt') {
        header = layout.projectDirectory.file("src/main/c/native.h")
        headerClassName = "NativeLib"
        targetPackage = "org.taack.occt"
        useSystemLoadLibrary = true
        libraries.add("nativeLib")
    }
    sourceSets.named("main") {
        jextract.libraries.addLater(occt)
    }
}

run  {
    println "Setting LD_LIBRARY_PATH=$OCCT78:$nativeLibPath2:$nativeLibPath"
    environment('LD_LIBRARY_PATH', "$OCCT78:$nativeLibPath2:$nativeLibPath")
}

dependencies {
    implementation 'org.apache.groovy:groovy:5.0.4'
    testImplementation platform('org.junit:junit-bom:6.0.3')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    println "Setting LD_LIBRARY_PATH=$OCCT78:$nativeLibPath2:$nativeLibPath"
    environment('LD_LIBRARY_PATH', "$OCCT78:$nativeLibPath2:$nativeLibPath")
    useJUnitPlatform()
}